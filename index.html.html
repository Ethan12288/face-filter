<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Face Filter - 濾鏡相機</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0a0a0c;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a32;
    --text: #e8e8ed;
    --text-dim: #8888a0;
    --accent: #ff6b4a;
    --accent-glow: rgba(255, 107, 74, 0.25);
  }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100dvh;
    width: 100vw;
    position: fixed;
    top: 0; left: 0;
  }

  /* === UPLOAD SCREEN === */
  #upload-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100dvh;
    padding: 24px;
    gap: 32px;
    background: radial-gradient(ellipse at 50% 30%, rgba(255,107,74,0.06) 0%, transparent 70%);
  }

  .app-title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #ff6b4a, #ff9a7a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .app-subtitle {
    font-size: 14px;
    color: var(--text-dim);
    text-align: center;
    line-height: 1.6;
    max-width: 300px;
  }

  .upload-zone {
    width: 280px;
    height: 280px;
    border: 2px dashed var(--border);
    border-radius: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    cursor: pointer;
    transition: all 0.3s;
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }

  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent);
    background: rgba(255,107,74,0.05);
    box-shadow: 0 0 40px var(--accent-glow);
  }

  .upload-zone img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: 20px;
  }

  .upload-icon {
    width: 56px; height: 56px;
    border-radius: 16px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .upload-icon svg { width: 28px; height: 28px; stroke: var(--accent); }

  .upload-text {
    font-size: 14px;
    color: var(--text-dim);
    font-weight: 400;
  }

  .btn {
    padding: 14px 36px;
    border: none;
    border-radius: 14px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 20px var(--accent-glow);
  }

  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 28px var(--accent-glow); }
  .btn-primary:disabled { opacity: 0.4; pointer-events: none; }

  /* === EDITOR SCREEN === */
  #editor-screen {
    display: none;
    flex-direction: column;
    height: 100dvh;
    position: relative;
  }

  .editor-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: rgba(10,10,12,0.9);
    backdrop-filter: blur(12px);
    z-index: 20;
    min-height: 52px;
  }

  .header-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
  }

  .header-btn:hover { border-color: var(--accent); }
  .header-btn svg { width: 16px; height: 16px; }

  .canvas-area {
    flex: 1;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }

  #camera-video {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  #overlay-canvas {
    position: absolute;
    z-index: 5;
    touch-action: none;
  }

  #interaction-layer {
    position: absolute;
    z-index: 10;
    touch-action: none;
    cursor: default;
  }

  /* === BOTTOM TOOLBAR === */
  .toolbar {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 10px 16px 20px;
    background: rgba(10,10,12,0.95);
    backdrop-filter: blur(12px);
    z-index: 20;
  }

  .tool-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .tool-btn {
    width: 44px; height: 44px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .tool-btn:hover { border-color: var(--accent); }
  .tool-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .tool-btn svg { width: 20px; height: 20px; }

  .slider-group {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    min-width: 0;
  }

  .slider-label {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    width: 48px;
    text-align: right;
    flex-shrink: 0;
  }

  input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    outline: none;
    min-width: 0;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 2px 8px var(--accent-glow);
  }

  .capture-btn {
    width: 64px; height: 64px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .capture-btn:hover { background: rgba(255,107,74,0.15); }
  .capture-btn:active { transform: scale(0.92); }

  .capture-btn-inner {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: var(--accent);
    transition: all 0.15s;
  }

  .capture-btn:active .capture-btn-inner { transform: scale(0.85); }

  .mode-label {
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
    padding: 2px 0;
  }

  /* === FLASH === */
  .flash {
    position: fixed;
    inset: 0;
    background: #fff;
    z-index: 999;
    opacity: 0;
    pointer-events: none;
    animation: flash 0.3s ease-out;
  }

  @keyframes flash {
    0% { opacity: 0.8; }
    100% { opacity: 0; }
  }

  /* === PREVIEW === */
  #preview-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  #preview-screen img {
    max-width: 90%;
    max-height: 70vh;
    object-fit: contain;
    border-radius: 16px;
  }

  .preview-actions {
    display: flex;
    gap: 16px;
    margin-top: 24px;
  }

  /* === ERASER CURSOR === */
  .eraser-cursor {
    position: fixed;
    border: 2px solid rgba(255,255,255,0.7);
    border-radius: 50%;
    pointer-events: none;
    z-index: 50;
    display: none;
    transform: translate(-50%, -50%);
  }

  /* === HELP MODAL === */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .modal-overlay.show { display: flex; }

  .modal-content {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    max-width: 360px;
    width: 100%;
  }

  .modal-content h3 {
    font-size: 18px;
    margin-bottom: 16px;
    color: var(--accent);
  }

  .modal-content p {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.7;
    margin-bottom: 12px;
  }

  .modal-content .step {
    display: flex;
    gap: 12px;
    margin-bottom: 14px;
  }

  .step-num {
    width: 24px; height: 24px;
    background: var(--accent);
    color: #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .step-text { font-size: 13px; color: var(--text-dim); line-height: 1.6; }

  .modal-close {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border: none;
    border-radius: 12px;
    background: var(--surface2);
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- UPLOAD SCREEN -->
<div id="upload-screen">
  <div class="app-title">濾鏡相機</div>
  <div class="app-subtitle">上傳一張圖片作為濾鏡，用橡皮擦擦出眼睛區域，<br>然後對齊鏡頭拍照</div>
  <div class="upload-zone" id="upload-zone">
    <div class="upload-icon" id="upload-icon">
      <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
      </svg>
    </div>
    <div class="upload-text" id="upload-label">點擊或拖放圖片</div>
  </div>
  <input type="file" id="file-input" accept="image/*" style="display:none">
  <button class="btn btn-primary" id="start-btn" disabled>開始使用</button>
</div>

<!-- EDITOR SCREEN -->
<div id="editor-screen">
  <div class="editor-header">
    <button class="header-btn" id="back-btn">
      <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
      返回
    </button>
    <button class="header-btn" id="help-btn">
      <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827m0 3h.01"/></svg>
      說明
    </button>
  </div>

  <div class="canvas-area" id="canvas-area">
    <video id="camera-video" autoplay playsinline muted></video>
    <canvas id="overlay-canvas"></canvas>
    <canvas id="interaction-layer"></canvas>
  </div>

  <div class="toolbar">
    <div class="mode-label" id="mode-label">模式：移動 / 縮放</div>
    <div class="tool-row">
      <button class="tool-btn active" id="tool-move" title="移動/縮放">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9m5.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15"/></svg>
      </button>
      <button class="tool-btn" id="tool-erase" title="橡皮擦">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 12h16.5m-16.5 0l4.5-4.5m-4.5 4.5l4.5 4.5"/></svg>
      </button>
      <button class="tool-btn" id="tool-restore" title="還原筆刷">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.992 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182"/></svg>
      </button>

      <div style="width:1px;height:28px;background:var(--border);margin:0 4px;flex-shrink:0;"></div>

      <button class="tool-btn" id="flip-btn" title="翻轉鏡頭">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 12c0-1.232-.046-2.453-.138-3.662a4.006 4.006 0 00-3.7-3.7 48.678 48.678 0 00-7.324 0 4.006 4.006 0 00-3.7 3.7c-.017.22-.032.441-.046.662M19.5 12l3-3m-3 3l-3-3m-12 3c0 1.232.046 2.453.138 3.662a4.006 4.006 0 003.7 3.7 48.656 48.656 0 007.324 0 4.006 4.006 0 003.7-3.7c.017-.22.032-.441.046-.662M4.5 12l3 3m-3-3l-3 3"/></svg>
      </button>

      <div style="flex:1"></div>

      <button class="capture-btn" id="capture-btn">
        <div class="capture-btn-inner"></div>
      </button>
    </div>

    <div class="tool-row" id="eraser-controls" style="display:none;">
      <div class="slider-group">
        <span class="slider-label">筆刷大小</span>
        <input type="range" id="brush-size" min="10" max="120" value="40">
      </div>
    </div>

    <div class="tool-row">
      <div class="slider-group">
        <span class="slider-label">透明度</span>
        <input type="range" id="opacity-slider" min="20" max="100" value="85">
      </div>
    </div>
  </div>
</div>

<!-- PREVIEW SCREEN -->
<div id="preview-screen">
  <img id="preview-img" src="">
  <div class="preview-actions">
    <button class="btn" style="background:var(--surface2);color:var(--text);border:1px solid var(--border);" id="preview-back">返回</button>
    <button class="btn btn-primary" id="preview-save">儲存照片</button>
  </div>
</div>

<!-- ERASER CURSOR -->
<div class="eraser-cursor" id="eraser-cursor"></div>

<!-- HELP MODAL -->
<div class="modal-overlay" id="help-modal">
  <div class="modal-content">
    <h3>使用說明</h3>
    <div class="step"><div class="step-num">1</div><div class="step-text">上傳一張圖片作為濾鏡覆蓋層</div></div>
    <div class="step"><div class="step-num">2</div><div class="step-text">使用「橡皮擦」工具擦出眼睛區域（讓鏡頭畫面從該處透出）</div></div>
    <div class="step"><div class="step-num">3</div><div class="step-text">使用「移動/縮放」工具調整濾鏡的位置與大小</div></div>
    <div class="step"><div class="step-num">4</div><div class="step-text">對齊你的臉部，讓眼睛透過擦除區域顯示</div></div>
    <div class="step"><div class="step-num">5</div><div class="step-text">按下拍照按鈕捕捉畫面！</div></div>
    <button class="modal-close" id="modal-close">了解</button>
  </div>
</div>

<canvas id="capture-canvas" style="display:none;"></canvas>

<script>
const $ = id => document.getElementById(id);

// === STATE ===
let filterImg = null;
let filterCanvas = null; // offscreen canvas holding the editable filter
let filterCtx = null;

let overlayX = 0, overlayY = 0, overlayScale = 1;
let currentTool = 'move'; // move | erase | restore
let brushSize = 40;
let overlayOpacity = 0.85;
let cameraStream = null;
let facingMode = 'user';
let isMirrored = true;

// Interaction state
let isDragging = false;
let lastTouchDist = 0;
let lastX = 0, lastY = 0;
let isErasing = false;

// === UPLOAD ===
const uploadZone = $('upload-zone');
const fileInput = $('file-input');
const startBtn = $('start-btn');

uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files.length) handleFile(e.target.files[0]); });

function handleFile(file) {
  if (!file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      filterImg = img;
      // Create offscreen filter canvas
      filterCanvas = document.createElement('canvas');
      filterCanvas.width = img.width;
      filterCanvas.height = img.height;
      filterCtx = filterCanvas.getContext('2d');
      filterCtx.drawImage(img, 0, 0);

      // Show preview
      uploadZone.innerHTML = '';
      const preview = document.createElement('img');
      preview.src = e.target.result;
      uploadZone.appendChild(preview);
      startBtn.disabled = false;
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// === START ===
startBtn.addEventListener('click', async () => {
  $('upload-screen').style.display = 'none';
  $('editor-screen').style.display = 'flex';
  await startCamera();
  initOverlay();
});

// === CAMERA ===
async function startCamera() {
  try {
    if (cameraStream) cameraStream.getTracks().forEach(t => t.stop());
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1280 }, height: { ideal: 1920 } },
      audio: false
    });
    const video = $('camera-video');
    video.srcObject = cameraStream;
    video.style.transform = isMirrored ? 'scaleX(-1)' : 'scaleX(1)';
    await video.play();
  } catch (err) {
    alert('無法啟動相機：' + err.message);
  }
}

$('flip-btn').addEventListener('click', async () => {
  facingMode = facingMode === 'user' ? 'environment' : 'user';
  isMirrored = facingMode === 'user';
  await startCamera();
});

// === OVERLAY INIT ===
function initOverlay() {
  const area = $('canvas-area');
  const rect = area.getBoundingClientRect();
  const oc = $('overlay-canvas');
  const il = $('interaction-layer');

  oc.width = rect.width;
  oc.height = rect.height;
  il.width = rect.width;
  il.height = rect.height;

  // Fit filter to canvas area
  if (filterImg) {
    const scaleW = rect.width / filterImg.width;
    const scaleH = rect.height / filterImg.height;
    overlayScale = Math.min(scaleW, scaleH) * 0.85;
    overlayX = (rect.width - filterImg.width * overlayScale) / 2;
    overlayY = (rect.height - filterImg.height * overlayScale) / 2;
  }

  renderOverlay();
}

function renderOverlay() {
  const oc = $('overlay-canvas');
  const ctx = oc.getContext('2d');
  ctx.clearRect(0, 0, oc.width, oc.height);

  if (!filterCanvas) return;

  ctx.globalAlpha = overlayOpacity;
  ctx.drawImage(
    filterCanvas,
    overlayX, overlayY,
    filterCanvas.width * overlayScale,
    filterCanvas.height * overlayScale
  );
  ctx.globalAlpha = 1;
}

// === TOOLS ===
$('tool-move').addEventListener('click', () => setTool('move'));
$('tool-erase').addEventListener('click', () => setTool('erase'));
$('tool-restore').addEventListener('click', () => setTool('restore'));

function setTool(tool) {
  currentTool = tool;
  $('tool-move').classList.toggle('active', tool === 'move');
  $('tool-erase').classList.toggle('active', tool === 'erase');
  $('tool-restore').classList.toggle('active', tool === 'restore');

  const labels = { move: '模式：移動 / 縮放', erase: '模式：橡皮擦（擦除眼睛區域）', restore: '模式：還原筆刷（恢復已擦除區域）' };
  $('mode-label').textContent = labels[tool];

  $('eraser-controls').style.display = (tool === 'erase' || tool === 'restore') ? 'flex' : 'none';
  $('interaction-layer').style.cursor = tool === 'move' ? 'grab' : 'crosshair';
  $('eraser-cursor').style.display = 'none';
}

$('brush-size').addEventListener('input', e => {
  brushSize = parseInt(e.target.value);
  updateEraserCursor();
});

$('opacity-slider').addEventListener('input', e => {
  overlayOpacity = parseInt(e.target.value) / 100;
  renderOverlay();
});

// === INTERACTION (MOVE / PINCH / ERASE) ===
const il = $('interaction-layer');

// Mouse events
il.addEventListener('mousedown', onPointerDown);
il.addEventListener('mousemove', onPointerMove);
il.addEventListener('mouseup', onPointerUp);
il.addEventListener('mouseleave', onPointerUp);
il.addEventListener('wheel', onWheel, { passive: false });

// Touch events
il.addEventListener('touchstart', onTouchStart, { passive: false });
il.addEventListener('touchmove', onTouchMove, { passive: false });
il.addEventListener('touchend', onTouchEnd);

function onPointerDown(e) {
  const x = e.offsetX, y = e.offsetY;
  if (currentTool === 'move') {
    isDragging = true;
    lastX = x; lastY = y;
    il.style.cursor = 'grabbing';
  } else {
    isErasing = true;
    applyBrush(x, y);
  }
}

function onPointerMove(e) {
  const x = e.offsetX, y = e.offsetY;

  if (currentTool !== 'move') {
    const ec = $('eraser-cursor');
    ec.style.display = 'block';
    ec.style.left = e.clientX + 'px';
    ec.style.top = e.clientY + 'px';
    updateEraserCursor();
  }

  if (currentTool === 'move' && isDragging) {
    overlayX += x - lastX;
    overlayY += y - lastY;
    lastX = x; lastY = y;
    renderOverlay();
  } else if (isErasing) {
    applyBrush(x, y);
  }
}

function onPointerUp() {
  isDragging = false;
  isErasing = false;
  if (currentTool === 'move') il.style.cursor = 'grab';
}

function onWheel(e) {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.95 : 1.05;
  const rect = il.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  overlayX = mx - (mx - overlayX) * delta;
  overlayY = my - (my - overlayY) * delta;
  overlayScale *= delta;
  renderOverlay();
}

let touchStartDist = 0;
let touchStartScale = 1;
let touchStartX = 0, touchStartY = 0;
let touchStartOX = 0, touchStartOY = 0;

function onTouchStart(e) {
  e.preventDefault();
  const rect = il.getBoundingClientRect();

  if (currentTool === 'move') {
    if (e.touches.length === 1) {
      isDragging = true;
      lastX = e.touches[0].clientX - rect.left;
      lastY = e.touches[0].clientY - rect.top;
    } else if (e.touches.length === 2) {
      const dx = e.touches[1].clientX - e.touches[0].clientX;
      const dy = e.touches[1].clientY - e.touches[0].clientY;
      touchStartDist = Math.hypot(dx, dy);
      touchStartScale = overlayScale;
      touchStartX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
      touchStartY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
      touchStartOX = overlayX;
      touchStartOY = overlayY;
    }
  } else {
    if (e.touches.length === 1) {
      isErasing = true;
      const x = e.touches[0].clientX - rect.left;
      const y = e.touches[0].clientY - rect.top;
      applyBrush(x, y);
    }
  }
}

function onTouchMove(e) {
  e.preventDefault();
  const rect = il.getBoundingClientRect();

  if (currentTool === 'move') {
    if (e.touches.length === 1 && isDragging) {
      const x = e.touches[0].clientX - rect.left;
      const y = e.touches[0].clientY - rect.top;
      overlayX += x - lastX;
      overlayY += y - lastY;
      lastX = x; lastY = y;
      renderOverlay();
    } else if (e.touches.length === 2) {
      const dx = e.touches[1].clientX - e.touches[0].clientX;
      const dy = e.touches[1].clientY - e.touches[0].clientY;
      const dist = Math.hypot(dx, dy);
      const scale = (dist / touchStartDist) * touchStartScale;
      const mx = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
      const my = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;

      overlayX = mx - (touchStartX - touchStartOX) * (scale / touchStartScale);
      overlayY = my - (touchStartY - touchStartOY) * (scale / touchStartScale);
      overlayScale = scale;
      renderOverlay();
    }
  } else {
    if (e.touches.length === 1 && isErasing) {
      const x = e.touches[0].clientX - rect.left;
      const y = e.touches[0].clientY - rect.top;
      applyBrush(x, y);
    }
  }
}

function onTouchEnd(e) {
  if (e.touches.length === 0) {
    isDragging = false;
    isErasing = false;
  }
}

// === BRUSH ===
function applyBrush(screenX, screenY) {
  if (!filterCtx) return;

  // Convert screen coords to filter canvas coords
  const fx = (screenX - overlayX) / overlayScale;
  const fy = (screenY - overlayY) / overlayScale;
  const fr = brushSize / overlayScale;

  if (fx < -fr || fy < -fr || fx > filterCanvas.width + fr || fy > filterCanvas.height + fr) return;

  filterCtx.save();
  filterCtx.globalCompositeOperation = currentTool === 'erase' ? 'destination-out' : 'source-over';

  if (currentTool === 'restore') {
    // Restore from original image
    filterCtx.beginPath();
    filterCtx.arc(fx, fy, fr, 0, Math.PI * 2);
    filterCtx.clip();
    filterCtx.drawImage(filterImg, 0, 0);
  } else {
    filterCtx.beginPath();
    filterCtx.arc(fx, fy, fr, 0, Math.PI * 2);
    filterCtx.fill();
  }

  filterCtx.restore();
  renderOverlay();
}

function updateEraserCursor() {
  const ec = $('eraser-cursor');
  ec.style.width = brushSize + 'px';
  ec.style.height = brushSize + 'px';
}

// === CAPTURE ===
$('capture-btn').addEventListener('click', () => {
  const video = $('camera-video');
  const area = $('canvas-area');
  const rect = area.getBoundingClientRect();
  const cc = $('capture-canvas');

  cc.width = rect.width * 2;
  cc.height = rect.height * 2;
  const ctx = cc.getContext('2d');
  ctx.scale(2, 2);

  // Draw video
  ctx.save();
  if (isMirrored) {
    ctx.translate(rect.width, 0);
    ctx.scale(-1, 1);
  }

  // Calculate video cover dimensions
  const vw = video.videoWidth, vh = video.videoHeight;
  const vAspect = vw / vh;
  const cAspect = rect.width / rect.height;
  let sx = 0, sy = 0, sw = vw, sh = vh;
  if (vAspect > cAspect) {
    sw = vh * cAspect;
    sx = (vw - sw) / 2;
  } else {
    sh = vw / cAspect;
    sy = (vh - sh) / 2;
  }

  ctx.drawImage(video, sx, sy, sw, sh, 0, 0, rect.width, rect.height);
  ctx.restore();

  // Draw filter overlay
  if (filterCanvas) {
    ctx.globalAlpha = overlayOpacity;
    ctx.drawImage(
      filterCanvas,
      overlayX, overlayY,
      filterCanvas.width * overlayScale,
      filterCanvas.height * overlayScale
    );
    ctx.globalAlpha = 1;
  }

  // Show flash
  const flash = document.createElement('div');
  flash.className = 'flash';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 400);

  // Show preview
  const dataUrl = cc.toDataURL('image/png');
  $('preview-img').src = dataUrl;
  $('preview-screen').style.display = 'flex';
});

$('preview-back').addEventListener('click', () => {
  $('preview-screen').style.display = 'none';
});

$('preview-save').addEventListener('click', () => {
  const a = document.createElement('a');
  a.href = $('preview-img').src;
  a.download = 'filter-photo-' + Date.now() + '.png';
  a.click();
  $('preview-screen').style.display = 'none';
});

// === NAV ===
$('back-btn').addEventListener('click', () => {
  if (cameraStream) cameraStream.getTracks().forEach(t => t.stop());
  $('editor-screen').style.display = 'none';
  $('upload-screen').style.display = 'flex';
});

$('help-btn').addEventListener('click', () => $('help-modal').classList.add('show'));
$('modal-close').addEventListener('click', () => $('help-modal').classList.remove('show'));
$('help-modal').addEventListener('click', e => { if (e.target === $('help-modal')) $('help-modal').classList.remove('show'); });

// === RESIZE ===
window.addEventListener('resize', () => {
  if ($('editor-screen').style.display === 'flex') initOverlay();
});
</script>
</body>
</html>
